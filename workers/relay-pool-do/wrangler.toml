name = "nym-relay-pool"
main = "src/index.js"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [
  { name = "RELAY_POOL", class_name = "RelayPoolDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelayPoolDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RelayPoolDO"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true